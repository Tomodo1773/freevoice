name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const ver = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            for (const f of ['package.json', 'src-tauri/tauri.conf.json']) {
              const obj = JSON.parse(fs.readFileSync(f, 'utf8'));
              obj.version = ver;
              fs.writeFileSync(f, JSON.stringify(obj, null, 2) + '\n');
            }
            const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo.replace(/^version = \".*\"/m, \`version = \"\${ver}\"\`));
          "

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Generate release notes
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:'- %s' "$PREV_TAG"..HEAD --no-merges)
          else
            LOG=$(git log --pretty=format:'- %s' --no-merges)
          fi
          # Multi-line output to GITHUB_OUTPUT
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: '--target x86_64-pc-windows-msvc'
